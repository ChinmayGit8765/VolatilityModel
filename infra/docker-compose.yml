# VolForecast local infrastructure stack
#
# Services:
#   postgres       — shared Postgres 16 backend for MLflow and Prefect metadata stores
#   mlflow-server  — MLflow 3 tracking server + model registry (port 5000)
#   prefect-server — Prefect 3 orchestration server (port 4200)
#   prefect-worker — Prefect worker polling the local-pool work pool
#
# Named volumes (never bind mounts — avoids SQLite-on-NTFS locking failures on Windows):
#   postgres_data     — Postgres data directory
#   mlflow_artifacts  — MLflow artifact store
#
# Usage:
#   cp infra/.env.example infra/.env   # then edit with real credentials
#   docker compose -f infra/docker-compose.yml up -d
#   # MLflow UI: http://localhost:5000
#   # Prefect UI: http://localhost:4200
#
# Security posture (local single-machine dev stack):
#   - All published ports bind to 127.0.0.1 only — on Windows, Docker Desktop
#     forwards published ports through the host firewall, so a plain
#     "5433:5432" binding would expose unauthenticated services to the LAN.
#   - POSTGRES_PASSWORD has NO default: the stack refuses to start unless it is
#     set in infra/.env, so the documented "edit with real credentials" step is
#     enforced rather than silently falling back to a known default.

services:

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-volforecast}
      # No fallback: fail loudly if infra/.env was never created (WR-05)
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in infra/.env}
      POSTGRES_DB: ${POSTGRES_DB:-mlflowdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init scripts run on first start (creates prefectdb alongside mlflowdb)
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-volforecast} -d ${POSTGRES_DB:-mlflowdb}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    # Host port 5433 to avoid conflict with other local Postgres instances.
    # MLflow and Prefect communicate with postgres on port 5432 via the Docker network,
    # so this binding only affects host-side access (e.g., psql, debugging tools).
    # Loopback-only: never expose Postgres to the LAN (WR-05).
    ports:
      - "127.0.0.1:5433:5432"

  mlflow-server:
    # Custom image: upstream MLflow image + pinned psycopg2-binary baked in at
    # build time, so startup never depends on PyPI (WR-06). See mlflow/Dockerfile.
    build:
      context: ./mlflow
    image: volforecast-mlflow:v3.13.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Loopback-only: MLflow has no authentication (WR-05).
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      # Synchronous psycopg2 URI for MLflow (no +asyncpg)
      MLFLOW_BACKEND_STORE_URI: "postgresql://${POSTGRES_USER:-volforecast}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in infra/.env}@postgres:5432/${POSTGRES_DB:-mlflowdb}"
      # MLflow 3.x security middleware: allow connections from Docker host.
      # MLFLOW_ALLOWED_HOSTS is not a supported env var; use --allowed-hosts flag via entrypoint script.
      MLFLOW_HOST: "0.0.0.0"
      MLFLOW_PORT: "5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
      - ./mlflow-entrypoint.sh:/mlflow-entrypoint.sh:ro
    command: ["bash", "/mlflow-entrypoint.sh"]

  prefect-server:
    image: prefecthq/prefect:3-latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Loopback-only: the Prefect API is unauthenticated (WR-05).
    ports:
      - "127.0.0.1:4200:4200"
    environment:
      # asyncpg URI for Prefect (separate DB from MLflow — prefectdb vs mlflowdb)
      PREFECT_API_DATABASE_CONNECTION_URL: "postgresql+asyncpg://${POSTGRES_USER:-volforecast}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in infra/.env}@postgres:5432/prefectdb"
      PREFECT_SERVER_API_HOST: "0.0.0.0"
      PREFECT_SERVER_UI_API_URL: "http://localhost:4200/api"
    command: prefect server start

  prefect-worker:
    image: prefecthq/prefect:3-latest
    restart: unless-stopped
    depends_on:
      - prefect-server
    environment:
      PREFECT_API_URL: "http://prefect-server:4200/api"
    # --type process makes Prefect 3 auto-create the work pool on first start.
    # Without it, the worker errors out because nothing else creates local-pool,
    # and restart: unless-stopped turns that into a crash loop.
    command: prefect worker start --pool local-pool --type process

  api:
    # Serving image: python:3.12-slim + libgomp1 (required by LightGBM) + uv sync
    build:
      context: ..
      dockerfile: infra/api/Dockerfile
    restart: unless-stopped
    # Wait for MLflow to be started before bringing up the API.
    # mlflow-server has no healthcheck so we use service_started (Pattern 9).
    depends_on:
      mlflow-server:
        condition: service_started
    # Loopback-only: matches the security posture of the rest of the stack (T-03-12).
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      # API container reaches MLflow via compose internal DNS (not localhost)
      MLFLOW_TRACKING_URI: "http://mlflow-server:5000"
      # Prediction log written to the bind-mounted data volume (Pitfall 7)
      PREDICTION_LOG_PATH: "/data/predictions/predictions.parquet"
    volumes:
      # Bind-mount the host data/ dir so the container can:
      #   - READ:  data/processed/ + data/features/ for feature computation
      #   - WRITE: data/predictions/predictions.parquet (Phase 4 log contract)
      # Note: NO mlflow_artifacts mount needed — Plan 03-01 enables --serve-artifacts
      # proxy mode so the tracking server proxies artifacts over HTTP (Pitfall 4 resolved).
      - ../data:/data

volumes:
  postgres_data:
  mlflow_artifacts:
